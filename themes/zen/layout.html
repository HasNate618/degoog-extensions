<!doctype html>
<html lang="en" __THEME_ATTRS__>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="zen - find what you need peacefully." />
    <link
      rel="icon"
      href="/public/favicon/favicon.ico?v=__APP_VERSION__"
      type="image/x-icon"
    />
    <link
      rel="manifest"
      href="/public/favicon/site.webmanifest"
      crossorigin="use-credentials"
    />
    <link
      rel="search"
      type="application/opensearchdescription+xml"
      title="zen"
      href="/opensearch.xml"
    />
    <title>zen</title>
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        var r = document.documentElement;
        if (t === "light") r.setAttribute("data-theme", "light");
        else if (t === "dark") r.setAttribute("data-theme", "dark");
        else {
          var m = window.matchMedia("(prefers-color-scheme: dark)");
          r.setAttribute("data-theme", m.matches ? "dark" : "light");
        }
      })();
    </script>
    <link
      rel="stylesheet"
      href="/public/themes/degoog-theme/style.css?v=__APP_VERSION__"
    />
    __THEME_CSS__ __PLUGIN_ASSETS__
  </head>
  <body __BODY_CLASS__>
    __PAGE_CONTENT__ __THEME_TEMPLATES__
    <script type="module" src="/public/app.js?v=__APP_VERSION__"></script>
    <script>
      (function() {
        var base = "/degoog";
        var origPush = history.pushState.bind(history);
        var origReplace = history.replaceState.bind(history);
        function fixUrl(url) {
          if (typeof url === "string" && url.startsWith("/") && !url.startsWith(base)) {
            return base + url;
          }
          return url;
        }
        history.pushState = function(data, unused, url) {
          return origPush(data, unused, fixUrl(url));
        };
        history.replaceState = function(data, unused, url) {
          return origReplace(data, unused, fixUrl(url));
        };
        if (location.pathname.startsWith("/") && !location.pathname.startsWith(base)) {
          origReplace.call(history, null, "", base + location.pathname + location.search + location.hash);
        }
      })();
      (function() {
        document.addEventListener("focusin", function(e) {
          if (e.target.matches(".search-input")) {
            document.body.classList.add("degoog-search-active");
          }
        });
        document.addEventListener("focusout", function(e) {
          setTimeout(function() {
            var a = document.activeElement;
            if (!a || !a.closest) { document.body.classList.remove("degoog-search-active"); return; }
            try {
              if (!a.closest(".search-bar, .results-search-bar, .ac-dropdown")) {
                document.body.classList.remove("degoog-search-active");
              }
            } catch(_) {
              document.body.classList.remove("degoog-search-active");
            }
          }, 200);
        });
      })();
    </script>
  </body>
</html>
